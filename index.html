<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quick Tip — practice grid</title>
<style>
  :root{
    --bg:#0f1226; --panel:#171a35; --ink:#eaecff; --muted:#9aa3d6;
    --accent:#7ee787; --accent2:#ffd166; --accent3:#8ab4ff;
    --line:#2a2f5a; --cell:#1f2447;
    --bad:#ff6b6b; --bad-bg:#3a1a1f; --good:#7ee787; --good-bg:#1a3a22;
    --cell-w: clamp(28px, 9vw, 48px);
    --cell-h: clamp(40px, 11vw, 56px);
    --cell-fs: clamp(1.1rem, 4.6vw, 1.6rem);
    --gap: clamp(2px, 0.8vw, 6px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  main{max-width:720px;margin:0 auto;padding:18px 12px 60px}
  h1{margin:0 0 4px;font-size:clamp(1.25rem,5vw,1.7rem)}
  p.lede{color:var(--muted);margin:0 0 14px;font-size:.92rem;line-height:1.4}
  .panel{background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin:12px 0}
  .field{display:flex;flex-direction:column;gap:6px;margin:0 0 10px}
  .field label{color:var(--muted);font-size:.82rem}
  .field input{
    background:#0a0d22;color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;font-size:1.2rem;
    font-variant-numeric:tabular-nums;width:100%}
  .field input:focus{outline:2px solid var(--accent3);border-color:transparent}

  /* Stack — rows of cells, column-aligned, no extra controls inside the row body. */
  .stack{display:flex;flex-direction:column;align-items:stretch;
    gap:var(--gap);margin:8px 0 4px}
  .row{
    display:flex;align-items:center;gap:var(--gap);
    font-variant-numeric:tabular-nums}
  .lhs-op{
    width:18px;flex-shrink:0;text-align:center;
    font-size:1.4rem;font-weight:700;color:var(--accent2)}
  .lhs-op.plus{color:var(--accent)}
  .lhs-op.eq{color:var(--accent3)}

  /* Tiny header tag above row 1 — names the row without taking row width. */
  .row-tag{
    color:var(--muted);font-size:.72rem;font-weight:600;
    letter-spacing:.18em;text-transform:uppercase;
    margin:2px 0 4px 24px}

  /* Phase break between row 1 (the bill) and row 2 (the shifted version). */
  .step-break{
    display:flex;align-items:center;gap:10px;
    margin:12px 0;color:var(--muted);
    font-size:.74rem;letter-spacing:.16em;text-transform:uppercase}
  .step-break::before, .step-break::after{
    content:"";flex:1;height:1px;background:var(--line)}
  .cells{display:flex;gap:var(--gap);align-items:center;flex:1;justify-content:flex-start}
  .cell{
    width:var(--cell-w);height:var(--cell-h);
    display:flex;align-items:center;justify-content:center;
    background:var(--cell);border:1px solid var(--line);border-radius:8px;
    font-size:var(--cell-fs);font-weight:600;flex-shrink:0;
    transition:background .15s,border-color .15s,color .15s}
  .cell.empty{background:transparent;border-style:dashed;color:var(--muted);font-weight:400}
  .cell.dot{
    width:10px;background:transparent;border:none;color:var(--accent2);
    font-size:calc(var(--cell-fs) * 1.1);font-weight:700}
  .cell.bad{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .cell.good{background:var(--good-bg);border-color:var(--good);color:var(--good)}
  .divider{height:2px;background:var(--line);margin:2px 0;align-self:stretch}

  /* The slide control sits to the RIGHT of row 2 as a compact pill — small
     enough not to push row 3 out of column alignment with rows 1/4. */
  .row.row-shift{position:relative}
  .slide{
    display:inline-flex;gap:4px;margin-left:var(--gap);align-items:center;
    flex-shrink:0}
  .slide button{
    width:30px;height:30px;border-radius:6px;border:1px solid var(--line);
    background:#0a0d22;color:var(--ink);font-size:.95rem;font-weight:700;
    cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center}
  .slide button:active{transform:translateY(1px);background:#161b3e}
  .slide .tag{
    margin-left:4px;font-size:.72rem;color:var(--muted);
    font-variant-numeric:tabular-nums;min-width:32px}
  .slide .tag.bad{color:var(--bad)}

  .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .check{
    flex:1;min-width:130px;background:var(--accent3);color:#000;border:none;
    border-radius:10px;padding:14px 22px;font-size:1.05rem;font-weight:700;cursor:pointer}
  .reset{
    background:transparent;color:var(--muted);border:1px solid var(--line);
    border-radius:10px;padding:14px 18px;font-weight:600;cursor:pointer}
  .verdict{
    margin-top:12px;padding:12px 14px;border-radius:10px;font-weight:600;
    display:none;font-size:.95rem}
  .verdict.show{display:block}
  .verdict.ok{background:var(--good-bg);border:1px solid var(--good);color:var(--good)}
  .verdict.no{background:var(--bad-bg);border:1px solid var(--bad);color:var(--bad)}
  .hint{color:var(--muted);font-size:.8rem;margin-top:8px;line-height:1.45}
</style>
</head>
<body>
<main>
  <h1>Quick Tip</h1>
  <p class="lede">
    Type the total. Move the decimal one place to the left to make 10%.
    Add the two 10% rows yourself, then check your answer.
  </p>

  <section class="panel">

    <div class="field">
      <label for="bill-input">Bill total</label>
      <input id="bill-input" type="text" inputmode="decimal"
             autocomplete="off" placeholder="e.g. 50.75" />
    </div>

    <div class="stack" aria-label="Calculation grid">
      <!-- Row 1: bill -->
      <div class="row-tag">total</div>
      <div class="row">
        <div class="lhs-op">&nbsp;</div>
        <div class="cells" id="cells-bill"></div>
      </div>

      <!-- Phase break: clear visual cue that the user now slides the decimal -->
      <div class="step-break" aria-hidden="true">
        <span>move the decimal now</span>
      </div>

      <!-- Row 2: shifted (10%) — slide control sits at row's end -->
      <div class="row row-shift">
        <div class="lhs-op">&nbsp;</div>
        <div class="cells" id="cells-shift"></div>
        <div class="slide">
          <button id="btn-left"  aria-label="Slide decimal left">←</button>
          <button id="btn-right" aria-label="Slide decimal right">→</button>
          <span class="tag" id="shift-tag">×1</span>
        </div>
      </div>

      <!-- Row 3: + mirror of row 2 -->
      <div class="row">
        <div class="lhs-op plus">+</div>
        <div class="cells" id="cells-mirror"></div>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <!-- Row 4: user answer -->
      <div class="row">
        <div class="lhs-op eq">=</div>
        <div class="cells" id="cells-result"></div>
      </div>
    </div>

    <div class="field" style="margin-top:10px">
      <label for="answer-input">Your answer (the sum of the two rows above)</label>
      <input id="answer-input" type="text" inputmode="decimal"
             autocomplete="off" placeholder="e.g. 10.15" />
    </div>

    <div class="actions">
      <button class="check" id="check">Check</button>
      <button class="reset" id="reset">Reset</button>
    </div>

    <div class="verdict" id="verdict"></div>
    <div class="hint">
      One <b>←</b> press = decimal moves one place left = 10% of the bill.
      Two 10% rows added together = a 20% tip.
    </div>
  </section>
</main>

<script>
(function(){
  // ---- State ---------------------------------------------------------
  // Bill is held as integer cents to avoid floating point drift.
  // shift = how many places the decimal has been moved LEFT in row 2.
  //   shift === 1 is the "useful" position (10% of bill);
  //   anything else flags the row red but still calculates.
  let billCents = 0;
  let answerCents = 0;
  let shift = 0;

  const INT_SLOTS = 5;   // visible integer cells (room to grow)
  const DEC_SLOTS = 2;   // visible decimal cells — anything beyond is wasted

  // ---- DOM -----------------------------------------------------------
  const billInput   = document.getElementById('bill-input');
  const answerInput = document.getElementById('answer-input');
  const cellsBill   = document.getElementById('cells-bill');
  const cellsShift  = document.getElementById('cells-shift');
  const cellsMirror = document.getElementById('cells-mirror');
  const cellsResult = document.getElementById('cells-result');
  const shiftTag    = document.getElementById('shift-tag');
  const verdict     = document.getElementById('verdict');

  // ---- Parsing -------------------------------------------------------
  // Turn a free-form decimal string into integer cents, ignoring junk.
  function toCents(str){
    if (!str) return 0;
    const m = String(str).replace(/[^\d.]/g,'').match(/^(\d*)(?:\.(\d*))?$/);
    if (!m) return 0;
    const whole = m[1] || '0';
    const frac  = (m[2] || '').slice(0,2).padEnd(2,'0');
    return parseInt(whole, 10) * 100 + parseInt(frac || '0', 10);
  }
  function digitsFromCents(cents){
    const s = String(cents).padStart(3,'0');
    return { int: s.slice(0,-2), dec: s.slice(-2) };
  }

  // ---- Render --------------------------------------------------------
  function renderRow(host, int, dec, decShift, flagBad){
    host.innerHTML = '';
    const all = int + dec;
    const naturalPos = int.length;
    const newPos = Math.max(0, naturalPos - decShift);
    const newInt = all.slice(0, newPos);
    // Cap visible decimal digits at DEC_SLOTS — overflow is dropped, by design.
    const newDec = all.slice(newPos, newPos + DEC_SLOTS);

    const intPad = INT_SLOTS - newInt.length;
    for (let i=0;i<intPad;i++) host.appendChild(makeCell('', true, false));
    for (const d of newInt) host.appendChild(makeCell(d, false, flagBad));

    const dot = document.createElement('div');
    dot.className = 'cell dot';
    dot.textContent = '·';
    host.appendChild(dot);

    for (const d of newDec) host.appendChild(makeCell(d, false, flagBad));
    const decPad = DEC_SLOTS - newDec.length;
    for (let i=0;i<decPad;i++) host.appendChild(makeCell('', true, false));
  }
  function makeCell(ch, empty, bad){
    const el = document.createElement('div');
    el.className = 'cell' + (empty ? ' empty' : '') + (bad ? ' bad' : '');
    el.textContent = ch;
    return el;
  }

  function render(){
    const bill = digitsFromCents(billCents);
    const ans  = digitsFromCents(answerCents);

    renderRow(cellsBill, bill.int, bill.dec, 0, false);
    const flagBad = (shift !== 1);
    renderRow(cellsShift,  bill.int, bill.dec, shift, flagBad);
    renderRow(cellsMirror, bill.int, bill.dec, shift, flagBad);
    renderRow(cellsResult, ans.int, ans.dec, 0, false);

    const tag = shift === 0 ? '×1'
              : shift === 1 ? '×0.1'
              : shift > 0   ? '×' + Math.pow(10, -shift).toFixed(shift)
              :               '×' + Math.pow(10, -shift);
    shiftTag.textContent = tag;
    shiftTag.classList.toggle('bad', flagBad);
  }

  // ---- Input handlers -----------------------------------------------
  billInput.addEventListener('input', () => {
    billCents = toCents(billInput.value);
    clearVerdict();
    render();
  });
  answerInput.addEventListener('input', () => {
    answerCents = toCents(answerInput.value);
    clearVerdict();
    render();
  });

  document.getElementById('btn-left').addEventListener('click',  () => {
    shift += 1; clearVerdict(); render();
  });
  document.getElementById('btn-right').addEventListener('click', () => {
    shift -= 1; clearVerdict(); render();
  });

  // ---- Check ---------------------------------------------------------
  // Truth = sum of what's actually shown in the two shifted rows.
  // Each shifted row is rounded to the nearest cent (DEC_SLOTS = 2), so
  // the expected sum is twice that displayed cent value — i.e. "what you
  // see is what you add."
  function expectedCents(){
    const displayedShiftedCents = Math.round(billCents * Math.pow(10, -shift));
    return 2 * displayedShiftedCents;
  }
  function fmt(cents){
    const sign = cents < 0 ? '-' : '';
    cents = Math.abs(cents);
    const whole = Math.floor(cents / 100);
    const frac  = String(cents % 100).padStart(2,'0');
    return `${sign}$${whole}.${frac}`;
  }
  function showVerdict(ok, msg){
    verdict.textContent = msg;
    verdict.className = 'verdict show ' + (ok ? 'ok' : 'no');
    [...cellsResult.children].forEach(c => {
      if (c.classList.contains('dot') || c.classList.contains('empty')) return;
      c.classList.add(ok ? 'good' : 'bad');
    });
  }
  function clearVerdict(){
    verdict.className = 'verdict';
    [...cellsResult.children].forEach(c => c.classList.remove('good','bad'));
  }
  document.getElementById('check').addEventListener('click', () => {
    if (billCents === 0) return showVerdict(false, 'Type the bill first.');
    const want = expectedCents();
    if (answerCents === want){
      showVerdict(true, `Correct — those two rows sum to ${fmt(want)}.`);
    } else {
      showVerdict(false,
        `Not yet. The two rows above sum to ${fmt(want)}.` +
        (shift !== 1 ? ' Hint: one ← press makes a 10% row → 20% tip.' : ''));
    }
  });

  document.getElementById('reset').addEventListener('click', () => {
    billCents = 0; answerCents = 0; shift = 0;
    billInput.value = ''; answerInput.value = '';
    clearVerdict(); render();
  });

  // ---- Keyboard niceties --------------------------------------------
  // Arrow keys slide the decimal whenever an input isn't focused.
  window.addEventListener('keydown', e => {
    const inField = document.activeElement === billInput
                 || document.activeElement === answerInput;
    if (inField) return;
    if (e.key === 'ArrowLeft'){ shift += 1; clearVerdict(); render(); e.preventDefault(); }
    if (e.key === 'ArrowRight'){ shift -= 1; clearVerdict(); render(); e.preventDefault(); }
    if (e.key === 'Enter'){ document.getElementById('check').click(); }
  });

  render();
})();
</script>
</body>
</html>
